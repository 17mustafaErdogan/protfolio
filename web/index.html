<!DOCTYPE html>
<html lang="tr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mühendislik portföyü — projeler, CV ve iletişim bilgileri.">
  <meta name="keywords" content="mühendis, portföy, yazılım, elektronik, proje">
  <meta name="author" content="Mühendislik Portföyü">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0d1117">

  <!-- Yerelde göreli yol yeterli; paylaşım önizlemesi için YOUR_DOMAIN altındakileri HTTPS tam URL ile değiştirin -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://YOUR_DOMAIN/">
  <meta property="og:title" content="Mühendislik Portföyü">
  <meta property="og:description" content="Projeler, CV ve iletişim bilgilerimi içeren kişisel portföy sitesi.">
  <meta property="og:image" content="https://YOUR_DOMAIN/icons/Icon-512.png">
  <meta property="og:locale" content="tr_TR">
  <link rel="canonical" href="https://YOUR_DOMAIN/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mühendislik Portföyü">
  <meta name="twitter:description" content="Projeler, CV ve iletişim bilgilerimi içeren kişisel portföy sitesi.">
  <meta name="twitter:image" content="https://YOUR_DOMAIN/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Portföy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mühendislik Portföyü</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
