# Dart analyzer / linter yapılandırması.
#
# Önceki very_good_analysis + strict-casts kombinasyonu, Supabase'den gelen
# Map<String, dynamic> kayıtlarının UI'da doğrudan kullanılması nedeniyle
# yüzlerce "dynamic → String" analiz hatası üretiyordu. Bu proje ölçeğinde
# tüm ekranlara açık cast eklemek yerine flutter_lints ile uyumlu set seçildi;
# kod tabanında tip güvenliği güçlendikçe strict-casts tekrar açılabilir.
#
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - "**/*.g.dart"

# VGA'dan kalan tekrarlayan kural tanımları kaldırıldı; flutter_lints yeterli.
# İsterseniz burada ek kuralları açıp kapatabilirsiniz.
linter:
  rules:
    # const ile gereksiz yeniden oluşturmayı azaltır (performans / tutarlılık).
    prefer_const_constructors: true
    # if/for/while gövdesinde süslü parantez zorunluluğu (okunabilirlik).
    curly_braces_in_flow_control_structures: true
